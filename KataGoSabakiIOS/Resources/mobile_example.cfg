# Conservative mobile defaults. The Swift bridge overrides these per device and
# model size, but keeping safe values here avoids desktop-style fallbacks.

numSearchThreads = 1
maxVisits = 32
maxTime = 4.0
nnMaxBatchSize = 2
nnCacheSizePowerOfTwo = 14

rules = tromp-taylor
komi = 7.5

logToStdout = false
logToStderr = false
logTime = true

ponderingEnabled = false
rootNoiseEnabled = false
chosenMoveTemperature = 0
chosenMoveTemperatureEarly = 0
